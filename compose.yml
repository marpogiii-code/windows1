services:
  gs:
    image: beast0823/gs:v2.1
    container_name: rangs
    environment:
      VERSION: "2025"
      USERNAME: "marpogi"
      PASSWORD: "marpogi"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./gs:/storage
    restart: always
    stop_grace_period: 2m
